<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — TypeForge</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Our CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <div class="auth-card">

        <a href="index.html" class="auth-logo">TypeForge</a>
        <h2>welcome back</h2>

        <!-- Success / Error message box -->
        <div class="msg-box" id="msgBox"></div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com">
            <span class="form-error" id="emailErr"></span>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••">
            <span class="form-error" id="passErr"></span>
        </div>

        <button class="auth-submit" id="submitBtn" onclick="handleLogin()">
            Login
        </button>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register</a>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    'use strict';

    // ===== Client-side Validation =====
    // Arrow function + destructuring
    const validateForm = ({ email, password }) => {
        const errors     = {};
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!email)                        errors.email    = 'Email is required';
        else if (!emailRegex.test(email))  errors.email    = 'Invalid email format';

        if (!password)                     errors.password = 'Password is required';
        else if (password.length < 6)      errors.password = 'Minimum 6 characters';

        return errors;
    };

    // Clear all error messages
    const clearErrors = () => {
        ['emailErr', 'passErr'].forEach(id => {
            document.getElementById(id).textContent = '';
        });
        const mb         = document.getElementById('msgBox');
        mb.style.display = 'none';
        mb.textContent   = '';
    };

    // Show top message box
    const showMsg = (text, type) => {
        const mb          = document.getElementById('msgBox');
        mb.className      = `msg-box ${type}`;
        mb.textContent    = text;
        mb.style.display  = 'block';
    };

    // ===== Login Handler — async/await =====
    const handleLogin = async () => {
        clearErrors();

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        // Client-side validation first
        const errors = validateForm({ email, password });

        if (errors.email) {
            document.getElementById('emailErr').textContent = errors.email;
            return;
        }
        if (errors.password) {
            document.getElementById('passErr').textContent = errors.password;
            return;
        }

        // Disable button while waiting
        const btn       = document.getElementById('submitBtn');
        btn.textContent = 'Logging in...';
        btn.disabled    = true;

        // Spread operator to build request body
        const body = new URLSearchParams({ ...{ email, password } });

        try {
            const res  = await fetch('php/login.php', {
                method:  'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body
            });

            // Destructure response
            const { success, message, redirect } = await res.json();

            if (success) {
                showMsg('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = redirect, 1000);
            } else {
                showMsg(message, 'error');
                btn.textContent = 'Login';
                btn.disabled    = false;
            }

        } catch (err) {
            showMsg('Network error. Is XAMPP running?', 'error');
            btn.textContent = 'Login';
            btn.disabled    = false;
        }
    };

    // Enter key triggers login
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    });

    </script>

</body>
</html>
